<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>devodrag - Links</title>
    <meta name="description" content="Developer & Furry enthusiast from Russia">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
</head>
<body>
    <!-- Particles.js фон -->
    <div id="particles-js"></div>
    
    <!-- Кнопка смены темы -->
    <button class="theme-toggle" id="themeToggle" title="Сменить тему">
        <svg class="sun-icon" viewBox="0 0 24 24" fill="currentColor">
            <path d="M12 18C8.68629 18 6 15.3137 6 12C6 8.68629 8.68629 6 12 6C15.3137 6 18 8.68629 18 12C18 15.3137 15.3137 18 12 18ZM12 16C14.2091 16 16 14.2091 16 12C16 9.79086 14.2091 8 12 8C9.79086 8 8 9.79086 8 12C8 14.2091 9.79086 16 12 16ZM11 1H13V4H11V1ZM11 20H13V23H11V20ZM3.51472 4.92893L4.92893 3.51472L7.05025 5.63604L5.63604 7.05025L3.51472 4.92893ZM16.9497 18.364L18.364 16.9497L20.4853 19.0711L19.0711 20.4853L16.9497 18.364ZM19.0711 3.51472L20.4853 4.92893L18.364 7.05025L16.9497 5.63604L19.0711 3.51472ZM5.63604 16.9497L7.05025 18.364L4.92893 20.4853L3.51472 19.0711L5.63604 16.9497ZM23 11V13H20V11H23ZM4 11V13H1V11H4Z"/>
        </svg>
        <svg class="moon-icon" viewBox="0 0 24 24" fill="currentColor" style="display: none;">
            <path d="M10 7C10 10.866 13.134 14 17 14C18.9584 14 20.729 13.1957 21.9995 11.8995C22 11.933 22 11.9665 22 12C22 17.5228 17.5228 22 12 22C6.47715 22 2 17.5228 2 12C2 6.47715 6.47715 2 12 2C12.0335 2 12.067 2 12.1005 2.00049C10.8043 3.27098 10 5.04157 10 7Z"/>
        </svg>
    </button>
    
    <!-- Кнопка мини-игры -->
    <button class="game-toggle" id="gameToggle" title="Играть в Snake">🎮</button>
    <!-- Экран загрузки -->
    <div class="loader-wrapper" id="loader">
        <div class="loader">
            <div class="spinner"></div>
            <p class="loader-text">Loading...</p>
        </div>
    </div>
    
    <div class="background-overlay"></div>
    
    <div class="container" id="content">
        <div class="card">
            <!-- Аватарка -->
            <div class="avatar-container">
                <img src="avatar.jpg" alt="Avatar" class="avatar" id="avatar">
            </div>
            
            <!-- Имя пользователя -->
            <h1 class="username">Deseara</h1>
            <p class="location">Russia 🇷🇺</p>
            <p class="bio">Developer & Furry enthusiast</p>
            
            <!-- Кнопки ссылок -->
            <div class="links">
                <a href="https://t.me/deseara" class="link-button telegram" target="_blank">
                    <svg class="icon" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M12 0C5.373 0 0 5.373 0 12s5.373 12 12 12 12-5.373 12-12S18.627 0 12 0zm5.894 8.221l-1.97 9.28c-.145.658-.537.818-1.084.508l-3-2.21-1.446 1.394c-.14.18-.357.295-.6.295-.002 0-.003 0-.005 0l.213-3.054 5.56-5.022c.24-.213-.054-.334-.373-.121l-6.869 4.326-2.96-.924c-.64-.203-.658-.64.135-.954l11.566-4.458c.538-.196 1.006.128.832.941z"/>
                    </svg>
                    TELEGRAM
                </a>
                
                <a href="https://github.com/Deseara" class="link-button github" target="_blank">
                    <svg class="icon" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/>
                    </svg>
                    GITHUB
                </a>
            </div>
        </div>
    </div>

    <!-- Модальное окно игры Snake -->
    <div class="game-modal" id="gameModal">
        <div class="game-content">
            <div class="game-header">
                <h2>🐍 Snake Game</h2>
                <button class="game-close" id="gameClose">✕</button>
            </div>
            <div class="game-score">Счет: <span id="score">0</span></div>
            <canvas id="gameCanvas" width="400" height="400"></canvas>
            
            <!-- Виртуальная клавиатура -->
            <div class="virtual-keyboard" id="virtualKeyboard">
                <button data-key="up">↑</button>
                <button data-key="left">←</button>
                <button data-key="right">→</button>
                <button data-key="down">↓</button>
            </div>
            
            <div class="game-controls">
                <p>Используй стрелки или кнопки для управления</p>
                <button class="game-restart" id="restartGame">Начать заново</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
